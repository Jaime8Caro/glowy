    <span class="pt-wordmark">glowy</span>
</div>
<div class="noise-overlay" aria-hidden="true"></div>

        </ul>

<main>
    <span class="section-eyebrow reveal-hidden">Reflexiones &amp; diario</span>
    <h1 class="reveal-hidden">Mi Diario<br><em style="font-style:italic;color:var(--accent)">Glowy</em></h1>

    <section class="blog-editor reveal-hidden" style="margin-top:48px;">
        <h2>Nueva Entrada</h2>
        <form id="blogForm">
            <div class="form-group">
                <label for="postTitle">Título del post</label>
                <input type="text" id="postTitle" class="styled-input" placeholder="Ej: Mi rutina de mañana..." required>
            </div>
            <div class="form-group">
                <label for="postImage">URL de imagen (opcional)</label>
                <input type="text" id="postImage" class="styled-input" placeholder="Pega un enlace de imagen o déjalo vacío">
            </div>
            <div class="form-group">
                <label for="postContent">Cuéntanos algo</label>
                <textarea id="postContent" class="styled-textarea" rows="4" placeholder="Hoy me sentí..." required></textarea>
            </div>
            <button type="submit" class="btn-primary">Publicar en el Muro</button>
        </form>
    </section>

    <section id="postsContainer"></section>
</main>

<footer>
    <p>@glowy — Tu proyecto personal empieza hoy.</p>
</footer>
